<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Superadmin — Platform Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0c0c14;
    --bg2: #14141e;
    --card: #1c1c28;
    --card2: #24243a;
    --border: #2e2e48;
    --accent: #6c5ce7;
    --accent-lt: #a29bfe;
    --text: #eee;
    --text-muted: #9a9ab0;
    --danger: #e06060;
    --success: #2ed573;
    --radius: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; min-height: 100vh; }
  .app { max-width: 960px; margin: 0 auto; padding: 20px; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .top-bar h1 { font-size: 20px; font-weight: 600; }
  .top-bar-right { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text-muted); }
  .btn-logout { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 14px; border-radius: var(--radius); cursor: pointer; font-size: 12px; }
  .btn-logout:hover { border-color: var(--accent); color: var(--text); }

  .stats-row { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
  .stat-card { flex: 1; min-width: 140px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .stat-card .stat-val { font-size: 28px; font-weight: 600; color: var(--accent-lt); }
  .stat-card .stat-lbl { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
  .card-form { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
  .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
  .form-row > .form-group { flex: 1; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .form-group input, .form-group select { width: 100%; padding: 10px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
  .btn-primary { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-primary:hover { background: var(--accent-lt); }
  .btn-sm { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 5px 12px; border-radius: var(--radius); cursor: pointer; font-size: 12px; }
  .btn-sm:hover { border-color: var(--accent); color: var(--text); }
  .btn-sm.danger { border-color: var(--danger); color: var(--danger); }

  .message { padding: 10px 14px; border-radius: var(--radius); margin-bottom: 16px; font-size: 13px; display: none; }
  .message.success { display: block; background: rgba(46,213,115,0.12); color: var(--success); }
  .message.error { display: block; background: rgba(224,96,96,0.12); color: var(--danger); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text-muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-active { background: rgba(46,213,115,0.15); color: var(--success); }
  .badge-inactive { background: rgba(224,96,96,0.15); color: var(--danger); }
  .hidden { display: none !important; }
  .link-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .btn-link { background: none; border: 1px solid var(--border); color: var(--accent-lt); padding: 4px 10px; border-radius: var(--radius); cursor: pointer; font-size: 11px; text-decoration: none; white-space: nowrap; }
  .btn-link:hover { border-color: var(--accent); color: #fff; background: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <h1>Platform Management</h1>
    <div class="top-bar-right">
      <span id="user-name"></span>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-val" id="stat-est">—</div><div class="stat-lbl">Establishments</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-active">—</div><div class="stat-lbl">Active</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-restaurants">—</div><div class="stat-lbl">Restaurants</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-orders">—</div><div class="stat-lbl">Total Orders</div></div>
  </div>

  <div id="msg" class="message"></div>

  <div class="card-form">
    <h3 class="section-title">Create Establishment</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="est-name" placeholder="Grand Hotel" />
      </div>
      <div class="form-group">
        <label>Slug (subdomain)</label>
        <input type="text" id="est-slug" placeholder="grand-hotel" />
      </div>
    </div>
    <button class="btn-primary" onclick="createEstablishment()">Create</button>
  </div>

  <div class="card-form" id="seed-admin-form" style="display:none;">
    <h3 class="section-title">Create Admin for: <span id="seed-est-name"></span></h3>
    <div class="form-row">
      <div class="form-group"><label>Name</label><input type="text" id="seed-name" placeholder="Admin Name" /></div>
      <div class="form-group"><label>Email</label><input type="email" id="seed-email" placeholder="admin@hotel.com" /></div>
    </div>
    <div class="form-group" style="max-width:300px;"><label>Password</label><input type="password" id="seed-password" placeholder="Min 6 characters" /></div>
    <button class="btn-primary" onclick="seedAdmin()">Create Admin</button>
    <button class="btn-sm" style="margin-left:8px;" onclick="closeSeedForm()">Cancel</button>
  </div>

  <h3 class="section-title">Establishments</h3>
  <div id="est-table"></div>
  <p style="margin-top:16px;font-size:12px;color:var(--text-muted);line-height:1.6;">
    <strong>Local dev:</strong> Visit links use subdomain routing (e.g. <code>grand-hotel.localhost</code>).
    Add entries to your <code>hosts</code> file: <code>127.0.0.1 grand-hotel.localhost</code> for each slug.
  </p>
</div>

<script>
const API = '/api';
let token = localStorage.getItem('auth_token');
let user = null;
let seedEstId = null;

function estUrl(slug, path) {
  const port = location.port ? ':' + location.port : '';
  const proto = location.protocol;
  const host = location.hostname;
  return `${proto}//${slug}.${host}${port}${path}`;
}

function authHeaders() {
  return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
}
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'message ' + type;
}
function clearMsg() { document.getElementById('msg').className = 'message'; }
function logout() {
  localStorage.removeItem('auth_token');
  localStorage.removeItem('auth_user');
  window.location.href = '/login';
}

async function loadStats() {
  try {
    const res = await fetch(API + '/superadmin/stats', { headers: authHeaders() });
    if (!res.ok) return;
    const s = await res.json();
    document.getElementById('stat-est').textContent = s.total_establishments;
    document.getElementById('stat-active').textContent = s.active_establishments;
    document.getElementById('stat-restaurants').textContent = s.total_restaurants;
    document.getElementById('stat-orders').textContent = s.total_orders;
  } catch(e) {}
}

async function loadEstablishments() {
  try {
    const res = await fetch(API + '/superadmin/establishments', { headers: authHeaders() });
    if (!res.ok) return;
    const list = await res.json();
    const el = document.getElementById('est-table');
    if (!list.length) {
      el.innerHTML = '<p style="color:var(--text-muted);padding:20px 0;">No establishments yet.</p>';
      return;
    }
    el.innerHTML = `<table><thead><tr><th>Name</th><th>Slug</th><th>Status</th><th>Created</th><th>Visit</th><th>Actions</th></tr></thead><tbody>` +
      list.map(e => `<tr>
        <td style="font-weight:500;">${e.name}</td>
        <td style="color:var(--text-muted);">${e.slug}</td>
        <td><span class="badge ${e.is_active?'badge-active':'badge-inactive'}">${e.is_active?'Active':'Inactive'}</span></td>
        <td style="color:var(--text-muted);font-size:12px;">${new Date(e.created_at).toLocaleDateString()}</td>
        <td>
          <div class="link-group">
            <a class="btn-link" href="${estUrl(e.slug, '/admin')}" target="_blank">Admin</a>
            <a class="btn-link" href="${estUrl(e.slug, '/room/101')}" target="_blank">Room</a>
            <a class="btn-link" href="${estUrl(e.slug, '/kitchen')}" target="_blank">Kitchen</a>
            <a class="btn-link" href="${estUrl(e.slug, '/login')}" target="_blank">Login</a>
          </div>
        </td>
        <td style="display:flex;gap:6px;">
          <button class="btn-sm" onclick="toggleEst('${e.id}',${!e.is_active})">${e.is_active?'Deactivate':'Activate'}</button>
          <button class="btn-sm" onclick="openSeedForm('${e.id}','${e.name}')">Add Admin</button>
        </td>
      </tr>`).join('') +
      `</tbody></table>`;
  } catch(e) { showMsg(e.message, 'error'); }
}

async function createEstablishment() {
  const name = document.getElementById('est-name').value.trim();
  const slug = document.getElementById('est-slug').value.trim().toLowerCase();
  if (!name || !slug) { showMsg('Name and slug are required', 'error'); return; }
  try {
    const res = await fetch(API + '/superadmin/establishments', {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ name, slug }),
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.detail); }
    document.getElementById('est-name').value = '';
    document.getElementById('est-slug').value = '';
    showMsg('Establishment created', 'success');
    loadEstablishments();
    loadStats();
  } catch(e) { showMsg(e.message, 'error'); }
}

async function toggleEst(id, active) {
  try {
    const res = await fetch(API + '/superadmin/establishments/' + id, {
      method: 'PATCH', headers: authHeaders(),
      body: JSON.stringify({ is_active: active }),
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.detail); }
    loadEstablishments();
    loadStats();
  } catch(e) { showMsg(e.message, 'error'); }
}

function openSeedForm(id, name) {
  seedEstId = id;
  document.getElementById('seed-est-name').textContent = name;
  document.getElementById('seed-admin-form').style.display = 'block';
  document.getElementById('seed-name').value = '';
  document.getElementById('seed-email').value = '';
  document.getElementById('seed-password').value = '';
}
function closeSeedForm() {
  seedEstId = null;
  document.getElementById('seed-admin-form').style.display = 'none';
}

async function seedAdmin() {
  if (!seedEstId) return;
  const name = document.getElementById('seed-name').value.trim();
  const email = document.getElementById('seed-email').value.trim();
  const password = document.getElementById('seed-password').value;
  if (!name || !email || !password) { showMsg('All fields required', 'error'); return; }
  try {
    const res = await fetch(API + '/superadmin/establishments/' + seedEstId + '/seed-admin', {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ name, email, password }),
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.detail); }
    showMsg('Admin created successfully', 'success');
    closeSeedForm();
  } catch(e) { showMsg(e.message, 'error'); }
}

async function init() {
  if (!token) { window.location.href = '/login'; return; }
  try {
    const res = await fetch(API + '/auth/me', { headers: authHeaders() });
    if (!res.ok) { logout(); return; }
    user = await res.json();
    if (user.role !== 'superadmin') { showMsg('Superadmin access required', 'error'); return; }
    document.getElementById('user-name').textContent = user.name;
  } catch { logout(); return; }

  loadStats();
  loadEstablishments();
}

init();
</script>
</body>
</html>
